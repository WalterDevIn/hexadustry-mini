<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexadustry Mini</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app" class="game-shell">
      <section class="hud-panel hud-panel--top">
        <strong>HEXADUSTRY MINI</strong>
        <span id="boot-status">iniciando canvas...</span>
      </section>

      <canvas id="game-canvas" aria-label="Hexadustry Mini game canvas"></canvas>

      <section class="build-menu" aria-label="Menu de construccion">
        <header class="build-menu__header">
          <strong>BUILD</strong>
          <span id="build-menu-status">sin bloque seleccionado</span>
        </header>

        <nav class="build-menu__tabs" aria-label="Categorias de construccion">
          <button class="build-menu__tab is-active" type="button" data-build-category="turrets" title="TORRETAS" aria-label="TORRETAS">⌖</button>
          <button class="build-menu__tab" type="button" data-build-category="extractors" title="EXTRACTORES" aria-label="EXTRACTORES">⌬</button>
          <button class="build-menu__tab" type="button" data-build-category="transporters" title="TRANSPORTADORES" aria-label="TRANSPORTADORES">⇢</button>
          <button class="build-menu__tab" type="button" data-build-category="factories" title="FABRICAS" aria-label="FABRICAS">⚙</button>
          <button class="build-menu__tab" type="button" data-build-category="walls" title="MUROS" aria-label="MUROS">⬡</button>
          <button class="build-menu__tab" type="button" data-build-category="units" title="UNIDADES" aria-label="UNIDADES">△</button>
          <button class="build-menu__tab" type="button" data-build-category="support" title="APOYO" aria-label="APOYO">+</button>
        </nav>

        <section class="build-menu__body">
          <span id="build-menu-category-label">TORRETAS</span>
          <small>click izq. coloca / click der. deconstruye</small>
        </section>

        <section id="build-menu-block-list" class="build-menu__blocks" aria-label="Bloques disponibles"></section>
      </section>

      <section class="hud-panel hud-panel--bottom">
        <span>WASD / Flechas: mover nave</span>
        <span>ECS: jugador + enemigo son entidades con componentes</span>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
