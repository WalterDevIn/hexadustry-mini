<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexadustry Mini</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app" class="game-shell">
      <section class="hud-panel hud-panel--top">
        <strong>HEXADUSTRY MINI</strong>
        <span id="boot-status">iniciando canvas...</span>
      </section>

      <canvas id="game-canvas" aria-label="Hexadustry Mini game canvas"></canvas>

      <section class="build-menu" aria-label="Menu de construccion">
        <header class="build-menu__header">
          <strong>BUILD</strong>
          <span id="build-menu-status">sin bloque seleccionado</span>
        </header>

        <nav class="build-menu__tabs" aria-label="Categorias de construccion">
          <button class="build-menu__tab is-active" type="button" data-build-category="turrets">TORRETAS</button>
          <button class="build-menu__tab" type="button" data-build-category="extractors">EXTRACTORES</button>
          <button class="build-menu__tab" type="button" data-build-category="transporters">TRANSPORTADORES</button>
          <button class="build-menu__tab" type="button" data-build-category="factories">FABRICAS</button>
          <button class="build-menu__tab" type="button" data-build-category="walls">MUROS</button>
          <button class="build-menu__tab" type="button" data-build-category="units">UNIDADES</button>
          <button class="build-menu__tab" type="button" data-build-category="support">APOYO</button>
        </nav>

        <section class="build-menu__body">
          <span id="build-menu-category-label">TORRETAS</span>
          <small>bloques pendientes</small>
        </section>
      </section>

      <section class="hud-panel hud-panel--bottom">
        <span>WASD / Flechas: mover nave</span>
        <span>ECS: jugador + enemigo son entidades con componentes</span>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
